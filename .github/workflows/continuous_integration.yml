name: Continuous integration

on:
  push:
    branches:
      - master
      - release-**
  pull_request:
    branches:
      - '**'
  release:
    types: ['prereleased', 'released']

  workflow_dispatch:

jobs:
  code_check:
    name: Code check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6

    - uses: pre-commit/action@v3.0.1
      env:
        # set the `no-commit-to-branch` to be skipped, otherwise the check fails when we merge to `master` branch
        SKIP: 'no-commit-to-branch'

  pyqt6-check:
    name: PyQt6 compatibility check
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/qgis/pyqgis4-checker:main-ubuntu
    steps:
      - name: Get source code
        uses: actions/checkout@v6

      - name: Check PyQt5 to PyQt6 compatibility
        run: |
          pyqt5_to_pyqt6.py --dry_run qfieldsync/
          pyqt5_to_pyqt6.py --logfile pyqt6_checker.log qfieldsync/

      - name: Upload script report if script fails
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: pyqgis4-checker-report
          path: pyqt6_checker.log
          retention-days: 7

  # Run unit tests
  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # TODO @suricactus: enable QGIS 4 tests, but for now it's crashing, see https://github.com/opengisch/qfieldsync/issues/757
        qgis_version: ["3.40", "3.44", "ltr"]
    env:
      QGIS_TEST_VERSION: ${{ matrix.qgis_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run tests
        run: |
          docker build -f .docker/Dockerfile --build-arg QGIS_TEST_VERSION=$QGIS_TEST_VERSION -t qfieldsync-test .
          docker run --rm qfieldsync-test .docker/xvfb-pytest

  release:
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'release' }}
    env:
      OSGEO_USERNAME: mkuhn
      OSGEO_PASSWORD: ${{ secrets.OSGEO_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TX_TOKEN: ${{ secrets.TX_TOKEN }}
      GITHUB_REF: ${{ github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install qtbase5-dev qttools5-dev-tools
          sudo pip install qgis-plugin-ci --break-system-packages

      - name: Package libqfieldsync
        run: |
          pip wheel $(grep -o -P '(https://.*.tar.gz)' requirements.txt)
          LIBQFIELDSYNC_COMMIT_SHA=$(echo $(grep -o -P '((https://github\.com/opengisch/libqfieldsync/.*.tar.gz))' requirements.txt) | grep -Eo '[0-9a-f]{40}')
          mv libqfieldsync-*.whl qfieldsync/libqfieldsync_${LIBQFIELDSYNC_COMMIT_SHA}.whl

      - name: Release
        run: |
          LIBQFIELDSYNC_COMMIT_SHA=$(echo $(grep -o -P '((https://github\.com/opengisch/libqfieldsync/.*.tar.gz))' requirements.txt) | grep -Eo '[0-9a-f]{40}')
          RELEASE_VERSION=${GITHUB_REF##*/}
          RELEASE_TAG=${GITHUB_REF##*/}
          qgis-plugin-ci release ${RELEASE_VERSION} \
              --release-tag ${RELEASE_TAG} \
              --transifex-token ${TX_TOKEN} \
              --github-token ${GITHUB_TOKEN} \
              --osgeo-username ${OSGEO_USERNAME} \
              --osgeo-password ${OSGEO_PASSWORD} \
              --asset-path qfieldsync/libqfieldsync_${LIBQFIELDSYNC_COMMIT_SHA}.whl

  package:
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'workflow_dispatch' }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TX_TOKEN: ${{ secrets.TX_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install qtbase5-dev qttools5-dev-tools
          sudo pip install qgis-plugin-ci --break-system-packages

      - name: Release
        run: |
          qgis-plugin-ci --no-validation package ${{ github.sha }}

      - name: Unzip
        run: |
          unzip qfieldsync.${{ github.sha }}.zip -d qfieldsync.${{ github.sha }}

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: qfieldsync.${{ github.sha }}
          path: ./qfieldsync.${{ github.sha }}

  translations:
    runs-on: ubuntu-24.04
    env:
      TX_TOKEN: ${{ secrets.TX_TOKEN }}
    if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        # run: sudo pip install qgis-plugin-ci --break-system-packages
        # TODO: install the stable release once https://github.com/opengisch/qgis-plugin-ci/pull/334 is merged and released
        run: sudo pip install --break-system-packages git+https://github.com/opengisch/qgis-plugin-ci.git@b391050c6f9cabf887dfb232f90f346a834b8f80

      - name: 🌍 Push translations
        run: |
          qgis-plugin-ci push-translation ${TX_TOKEN}
